version: "3.9"

services:
  backend:
    build: 
      context: .
    container_name: backend
    command: >
      sh -c "
            python3 manage.py makemigrations users movies library comments downloads && 
            python3 manage.py migrate &&
            python manage.py seed_movies  &&
            python manage.py setup_oauth &&

            python3 manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./src:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    container_name: db
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./data/kel-baam:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
  adminer:
      image: adminer:latest
      container_name: adminer
      restart: unless-stopped
      ports:
        - "8080:8080"
      depends_on:
        db:
          condition: service_healthy
  nginx:
    image: nginx:latest
    container_name: nginx
    restart: unless-stopped
    command: ["nginx", "-g", "daemon off;"]
  
  redis:
    image: redis:alpine
    container_name: redis
    restart: unless-stopped

  celery:
    build: .
    command: celery -A backend worker --loglevel=info
    working_dir: /app
    volumes:
      - ./src:/app
    depends_on:
      - redis
      - db
    env_file:
      - .env
    

  celery-beat:
    build: .
    command: celery -A backend beat --loglevel=info
    volumes:
      - ./src:/app
    working_dir: /app
    depends_on:
      - redis
    env_file:
      - .env
  
volumes:
  backend_data:
  postgres_data: