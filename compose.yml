# version: "3.9"

services:
  backend:
    build: 
      context: .
    container_name: backend
    command: >
      sh -c "
            python3 /app/src/manage.py makemigrations --noinput users movies library comments downloads && 
            python3 /app/src/manage.py migrate --noinput &&
            python /app/src/manage.py seed_movies &&
            python /app/src/manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./src:/app/src
      - media_data:/media
    working_dir: /app/src
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    container_name: db
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
  adminer:
      image: adminer:latest
      container_name: adminer
      restart: unless-stopped
      ports:
        - "8080:8080"
      depends_on:
        db:
          condition: service_healthy

  redis:
    image: redis:alpine
    container_name: redis
    restart: unless-stopped

  celery:
    build: .
    command: ["celery", "-A", "backend", "worker", "-l", "info", "--max-tasks-per-child", "10"]
    working_dir: /app/src
    volumes:
      - ./src:/app/src
      - media_data:/media
    depends_on:
      - redis
      - db
    env_file:
      - .env
    # network_mode: host
    # ports:
    #   - "6881:6881"
    #   - "6881:6881/udp"
    

  celery-beat:
    build: .
    command: celery -A backend beat --loglevel=info
    volumes:
      - ./src:/app/src
    working_dir: /app/src
    depends_on:
      - redis
    env_file:
      - .env
  
volumes:
  backend_data:
  postgres_data:
  media_data: