# version: "3.9"

services:
  backend:
    build:
      context: .
    container_name: backend
    command: >
      sh -c "
            python3 manage.py makemigrations --noinput &&
            python3 manage.py migrate --noinput &&
            python3 manage.py setup_oauth &&
            python3 manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./backend:/app
      - media_data:/media
    working_dir: /app
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  db:
    image: postgres:16-alpine
    container_name: db
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer:latest
    container_name: adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

  redis:
    image: redis:alpine
    container_name: redis
    restart: unless-stopped

  celery:
    build: .
    command: >
      celery -A config worker
      --pool=gevent
      --concurrency=100
      --loglevel=info
    working_dir: /app/
    volumes:
      - ./backend:/app
      - media_data:/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    env_file:
      - .env

  celery-beat:
    build: .
    command: celery -A config beat --loglevel=info
    working_dir: /app
    volumes:
      - ./backend:/app
      - media_data:/media        # added: consistent with celery worker
    depends_on:
      db:
        condition: service_healthy # added: beat may trigger db-touching tasks
      redis:
        condition: service_started
    env_file:
      - .env

volumes:
  media_data:                    # removed orphaned backend_data & postgres_data
